(function(){
  function setKey(k){
    if(!k) return;
    var el = document.getElementById('apiKey');
    if(el){ el.value = k; }
    var card = document.getElementById('apiCard');
    if(card){ card.style.display='none'; }
  }
  try {
    var p = new URLSearchParams(location.search);
    setKey(p.get('key'));
  } catch(e){}
  window.addEventListener('message', function(ev){
    if(ev && ev.data && ev.data.type === 'gemini-key'){ setKey(ev.data.key); }
  });
})();

function extractJson(txt) {
  let s = String(txt || '').replace(/```json|```/g, '').trim();
  const start = s.search(/[\{\[]/);
  if (start === -1) throw new Error('JSON not found');
  const openCh = s[start], closeCh = openCh === '[' ? ']' : '}';
  // find last matching close
  let end = s.lastIndexOf(closeCh);
  if (end < start) end = s.length - 1;
  s = s.slice(start, end + 1);
  try { return JSON.parse(s); } catch(e) {
    // attempt repair: trim trailing commas, control chars, unterminated string
    let r = s.replace(/,\s*([}\]])/g, '$1').replace(/[\x00-\x1F\x7F]/g, ' ');
    // close any unterminated string by adding closing quote+brace
    const quotes = (r.match(/(?<!\\)"/g) || []).length;
    if (quotes % 2 === 1) r += '"';
    // pad missing closing braces
    const opens = (r.match(/\{/g) || []).length;
    const closes = (r.match(/\}/g) || []).length;
    for (let i = 0; i < opens - closes; i++) r += '}';
    return JSON.parse(r);
  }
}

async function callGemini(prompt) {
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) throw new Error('Gemini API 키를 입력해주세요');
  const models = ['gemini-2.5-flash','gemini-2.5-pro','gemini-2.0-flash','gemini-1.5-flash-latest'];
  let lastErr = '';
  for (const model of models) {
    try {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
      const r = await fetch(url, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          contents:[{role:'user',parts:[{text:prompt}]}],
          generationConfig:{maxOutputTokens:16000,temperature:0.85,topP:0.95,responseMimeType:'application/json'}
        })
      });
      const d = await r.json();
      if (d.error) { lastErr = d.error.message || JSON.stringify(d.error); console.warn(model, 'error:', lastErr); continue; }
      const txt = d.candidates?.[0]?.content?.parts?.map(p=>p.text||'').join('') || '';
      if (!txt) { lastErr = 'empty response'; continue; }
      return extractJson(txt);
    } catch(e) { lastErr = e.message; console.warn(model, 'fail:', e); }
  }
  throw new Error('Gemini 호출 실패: ' + lastErr);
}

async function genBatchWithRetry(batch) {
  // try as a batch, then fall back to per-section
  try {
    const out = await callGemini(sectionPrompt(batch));
    const ok = batch.every(s => typeof out[s.id] === 'string' && out[s.id].length > 50);
    if (ok) return out;
    // partial — fill missing per-section
    const merged = {...out};
    for (const s of batch) {
      if (typeof merged[s.id] !== 'string' || merged[s.id].length < 50) {
        try { const o2 = await callGemini(sectionPrompt([s])); merged[s.id] = o2[s.id] || merged[s.id] || '생성 오류'; }
        catch(e) { merged[s.id] = merged[s.id] || '생성 오류'; }
      }
    }
    return merged;
  } catch(e) {
    console.warn('batch failed, retry per-section:', e.message);
    const out = {};
    for (const s of batch) {
      try { const o = await callGemini(sectionPrompt([s])); out[s.id] = o[s.id] || '생성 오류'; }
      catch(err) { out[s.id] = '생성 오류 (' + err.message + ')'; }
    }
    return out;
  }
}

async function makePDF() {
  const btn = document.getElementById('pdfBtn');
  btn.disabled = true; btn.textContent = '생성 중...';
  document.getElementById('pdfProg').style.display = 'block';

  const {jsPDF} = window.jspdf;
  const pdf = new jsPDF('p','mm','a4');
  const rd = document.getElementById('pdfRender');
  let pg = 0;
  const total = 1+2+(SEC.length*2); // cover+2TOC+33*2 = 69

  const setP2 = (n,txt) => {
    document.getElementById('ppf').style.width=Math.round(n/total*100)+'%';
    document.getElementById('ppl').textContent=txt;
    document.getElementById('ppct').textContent=n+' / '+total+' 페이지';
  };

  const cap = async (html, isFirst) => {
    if(!isFirst) pdf.addPage();
    rd.innerHTML = html;
    await new Promise(r=>setTimeout(r,120));
    const cvs = await html2canvas(rd,{scale:1.4,backgroundColor:'#fff',useCORS:true,logging:false});
    pdf.addImage(cvs.toDataURL('image/jpeg',0.88),'JPEG',0,0,210,297);
    pg++; setP2(pg,'렌더링 중...');
  };

  setP2(0,'표지 생성 중...');
  await cap(pgCover(), true);
  await cap(pgTOC(1), false);
  await cap(pgTOC(2), false);

  for (let i=0; i<SEC.length; i++) {
    setP2(pg, `섹션 ${i+1}/33 — ${SEC[i].title.substring(0,15)}`);
    await cap(pgSecTitle(SEC[i], i+1), false);
    await cap(pgSecContent(SEC[i], i+1, res[SEC[i].id]||''), false);
  }

  const fname = `${usr.name}_운명분석보고서_69p.pdf`;
  lastBlob = pdf.output('blob');
  pdf.save(fname);
  document.getElementById('pdfProg').style.display='none';
  btn.disabled=false; btn.textContent='⬇ PDF 다운로드 (69p)';
}
